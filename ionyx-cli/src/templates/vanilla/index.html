<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-ionyx-app - Ionyx Framework</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        text-align: center;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      h1 {
        margin-bottom: 1rem;
        font-size: 2.5rem;
      }
      .info {
        background: rgba(255, 255, 255, 0.05);
        padding: 1rem;
        border-radius: 8px;
        margin: 1rem 0;
      }
      .info p {
        margin: 0.5rem 0;
      }
      .features {
        background: rgba(255, 255, 255, 0.05);
        padding: 1rem;
        border-radius: 8px;
        margin: 1rem 0;
      }
      .features ul {
        list-style: none;
        padding: 0;
        text-align: left;
        max-width: 300px;
        margin: 0 auto;
      }
      .features li {
        padding: 0.25rem 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="status">Loading...</h1>
      <div class="info">
        <p><strong>App:</strong> <span id="app-name">-</span></p>
        <p><strong>Version:</strong> <span id="app-version">-</span></p>
      </div>
      <div class="features">
        <h2>🚀 Ionyx Framework Features</h2>
        <ul>
          <li>✅ File System Access</li>
          <li>✅ Network Requests</li>
          <li>✅ OS Information</li>
          <li>✅ Cross-platform Desktop Apps</li>
          <li>✅ Rust Backend Performance</li>
          <li>✅ Vanilla JavaScript</li>
          <li id="webgpu-status">⏳ Checking WebGPU...</li>
        </ul>
      </div>
      <p>Edit this file and reload to see changes!</p>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
